[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
  name = "piratesocial-hub"
  protocol = "TCP"
  internalPort = 3000

[[services.healthchecks]]
  path = "/"
  protocol = "HTTP"
  interval = 30
  timeout = 5
